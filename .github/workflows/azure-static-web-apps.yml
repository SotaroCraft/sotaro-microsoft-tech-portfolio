name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    environment: AZURE_STATIC_WEB_APPS_API_TOKEN
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Verify deployment token is configured
        env:
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -z "$SWA_TOKEN" ]; then
            echo "AZURE_STATIC_WEB_APPS_API_TOKEN is empty. Add it to Environment secrets."
            exit 1
          fi
          echo "Deployment token is configured (length ${#SWA_TOKEN})."

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: "api"
          output_location: "apps/web/dist"
          app_build_command: "corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install --frozen-lockfile && pnpm build && cp apps/web/staticwebapp.config.json apps/web/dist/staticwebapp.config.json"
          api_build_command: "corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install --frozen-lockfile && pnpm --filter @microbootcan/shared build && pnpm --filter @microbootcan/api build"

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    environment: AZURE_STATIC_WEB_APPS_API_TOKEN
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
