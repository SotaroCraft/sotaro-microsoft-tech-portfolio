name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    environment: AZURE_STATIC_WEB_APPS_API_TOKEN
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version omitted — reads packageManager from package.json (pnpm@9.15.4)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build monorepo
        run: pnpm build

      - name: Copy SWA config into dist
        run: cp apps/web/staticwebapp.config.json apps/web/dist/staticwebapp.config.json

      - name: Prepare API bundle for SWA
        run: |
          pnpm --filter @microbootcan/api --prod deploy swa-api
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('swa-api/package.json', 'utf8'));
            pkg.dependencies['@microbootcan/shared'] = 'file:./node_modules/@microbootcan/shared';
            delete pkg.devDependencies;
            fs.writeFileSync('swa-api/package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/web"
          api_location: "swa-api"
          output_location: "dist"
          skip_app_build: true
          api_build_command: "echo API prebuilt via pnpm deploy"

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    environment: AZURE_STATIC_WEB_APPS_API_TOKEN
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
